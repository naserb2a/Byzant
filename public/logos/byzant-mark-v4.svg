<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- V4: Crosshair Coin — outer ring, cross arms touch the ring edge, center circle -->
  <circle cx="60" cy="60" r="54" stroke="currentColor" stroke-width="1.4"/>
  <!-- Arms touch the outer ring (r=54 intersects at 6 and 114) -->
  <line x1="6" y1="60" x2="114" y2="60" stroke="currentColor" stroke-width="1.4"/>
  <line x1="60" y1="6" x2="60" y2="114" stroke="currentColor" stroke-width="1.4"/>
  <!-- Center dot -->
  <circle cx="60" cy="60" r="5" stroke="currentColor" stroke-width="1.4"/>
</svg>
