<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- V3: Byzantine Serif Cross — outer ring + cross with serif tab ends -->
  <circle cx="60" cy="60" r="54" stroke="currentColor" stroke-width="1.4"/>
  <!-- Cross arms reach r=40 from center -->
  <line x1="20" y1="60" x2="100" y2="60" stroke="currentColor" stroke-width="1.4"/>
  <line x1="60" y1="20" x2="60" y2="100" stroke="currentColor" stroke-width="1.4"/>
  <!-- Serif ends — thin perpendicular tab at each arm tip -->
  <line x1="55" y1="20" x2="65" y2="20" stroke="currentColor" stroke-width="1.4"/>
  <line x1="55" y1="100" x2="65" y2="100" stroke="currentColor" stroke-width="1.4"/>
  <line x1="20" y1="55" x2="20" y2="65" stroke="currentColor" stroke-width="1.4"/>
  <line x1="100" y1="55" x2="100" y2="65" stroke="currentColor" stroke-width="1.4"/>
</svg>
