<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- V5: Medallion — outer ring + inner ring + 4 cardinal accent dots between rings -->
  <circle cx="60" cy="60" r="54" stroke="currentColor" stroke-width="1.4"/>
  <circle cx="60" cy="60" r="38" stroke="currentColor" stroke-width="1.4"/>
  <!-- 4 filled cardinal dots at r=46 midpoint between rings -->
  <circle cx="60" cy="14" r="2.5" fill="currentColor"/>
  <circle cx="60" cy="106" r="2.5" fill="currentColor"/>
  <circle cx="106" cy="60" r="2.5" fill="currentColor"/>
  <circle cx="14" cy="60" r="2.5" fill="currentColor"/>
  <!-- Tiny center cross -->
  <line x1="52" y1="60" x2="68" y2="60" stroke="currentColor" stroke-width="1.4"/>
  <line x1="60" y1="52" x2="60" y2="68" stroke="currentColor" stroke-width="1.4"/>
</svg>
